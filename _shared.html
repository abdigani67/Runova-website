<!-- SHARED NAV + FOOTER + CSS VARS — included by all pages -->
<style>
:root{
  --purple:#160726;
  --purple-mid:#27104a;
  --gold:#d9a94e;
  --gold-soft:#c49a3c;
  --ivory:#f7f3ec;
  --muted:#6b6070;
  --white:#ffffff;
  --radius:14px;
  --transition:0.22s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--purple);line-height:1.6;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(22,7,38,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(217,169,78,0.15)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1100px;margin:0 auto;padding:0 24px}
.nav-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ivory);letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{color:rgba(247,243,236,0.75);font-size:14.5px;font-weight:500;transition:color var(--transition)}
.nav-links a:hover,.nav-links a.active{color:var(--ivory)}
.nav-cta{background:var(--gold);color:var(--purple)!important;padding:9px 20px;border-radius:8px;font-weight:600;font-size:14px!important;transition:background var(--transition),transform var(--transition)!important}
.nav-cta:hover{background:#e8b84e;transform:translateY(-1px)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.nav-hamburger span{width:22px;height:2px;background:var(--ivory);border-radius:2px;transition:var(--transition)}
@media(max-width:700px){
  .nav-links{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(22,7,38,0.98);flex-direction:column;align-items:flex-start;padding:24px;gap:20px}
  .nav-links.show{display:flex}
  .nav-hamburger{display:flex}
}

/* FOOTER */
.footer{background:var(--purple);color:rgba(247,243,236,0.6);padding:60px 0 32px}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px}
.footer-brand .logo{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ivory);margin-bottom:12px}
.footer-brand .logo span{color:var(--gold)}
.footer-brand p{font-size:14px;line-height:1.7;max-width:240px}
.footer-col h4{color:var(--ivory);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.footer-col a{display:block;font-size:14px;color:rgba(247,243,236,0.6);margin-bottom:10px;transition:color var(--transition)}
.footer-col a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(247,243,236,0.1);padding-top:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-bottom p{font-size:13px}
.footer-bottom-links{display:flex;gap:20px}
.footer-bottom-links a{font-size:13px;color:rgba(247,243,236,0.5);transition:color var(--transition)}
.footer-bottom-links a:hover{color:var(--gold)}
@media(max-width:760px){.footer-grid{grid-template-columns:1fr 1fr}.footer-brand{grid-column:1/-1}}
@media(max-width:500px){.footer-grid{grid-template-columns:1fr}}

/* SHARED SECTIONS */
.page-hero{background:linear-gradient(135deg,var(--purple) 0%,var(--purple-mid) 100%);padding:140px 0 80px;text-align:center}
.page-hero .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px}
.page-hero h1{font-family:'DM Serif Display',serif;font-size:clamp(36px,5vw,60px);color:var(--ivory);line-height:1.08;letter-spacing:-0.02em;margin-bottom:20px}
.page-hero h1 em{color:var(--gold);font-style:normal}
.page-hero p{font-size:18px;color:rgba(247,243,236,0.72);max-width:540px;margin:0 auto 32px;line-height:1.65}
.btn-gold{background:var(--gold);color:var(--purple);font-weight:700;padding:14px 28px;border-radius:10px;font-size:15px;border:none;cursor:pointer;transition:background var(--transition),transform var(--transition);display:inline-block;font-family:'DM Sans',sans-serif}
.btn-gold:hover{background:#e8b84e;transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--ivory);border:1.5px solid rgba(247,243,236,0.35);font-weight:600;padding:13px 26px;border-radius:10px;font-size:15px;cursor:pointer;transition:border-color var(--transition),color var(--transition);display:inline-block;font-family:'DM Sans',sans-serif}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(22,7,38,0.7);z-index:999;align-items:center;justify-content:center;padding:24px}
.modal-bg.open{display:flex}
.modal-box{background:var(--ivory);border-radius:16px;max-width:640px;width:100%;max-height:80vh;overflow-y:auto;padding:36px}
.modal-box h3{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:20px;color:var(--purple)}
.modal-box p,.modal-box li{font-size:15px;line-height:1.7;color:var(--purple);margin-bottom:12px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);margin-top:-4px}
</style>
